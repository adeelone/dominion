services:
  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api
  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env.example
    depends_on:
      - postgres
      - redis
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: dominion
      POSTGRES_USER: dominion
      POSTGRES_PASSWORD: dominion
    ports:
      - "5432:5432"
  redis:
    image: redis:7
    ports:
      - "6379:6379"
